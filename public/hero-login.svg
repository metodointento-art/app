      <stop offset="35%" stop-color="#060242" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060242" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
